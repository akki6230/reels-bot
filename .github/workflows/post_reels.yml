name: 🚀 Post Daily Educational Reels

on:
  schedule:
    # IST = UTC+5:30 — posting every hour from 7AM to 9PM IST
    # Format: minute hour * * *  (UTC)
    - cron: "30 1 * * *"   # 7:00 AM IST  — Space EN
    - cron: "30 2 * * *"   # 8:00 AM IST  — Space HI
    - cron: "30 3 * * *"   # 9:00 AM IST  — History EN
    - cron: "30 4 * * *"   # 10:00 AM IST — History HI
    - cron: "30 5 * * *"   # 11:00 AM IST — Geography EN
    - cron: "30 6 * * *"   # 12:00 PM IST — Geography HI
    - cron: "30 7 * * *"   # 1:00 PM IST  — Science EN
    - cron: "30 8 * * *"   # 2:00 PM IST  — Science HI
    - cron: "30 9 * * *"   # 3:00 PM IST  — Sports EN
    - cron: "30 10 * * *"  # 4:00 PM IST  — Sports HI
    - cron: "30 11 * * *"  # 5:00 PM IST  — World News EN
    - cron: "30 15 * * *"  # 9:00 PM IST  — World News HI

  workflow_dispatch:
    inputs:
      topic:
        description: "Topic (space/history/geography/science/sports/worldnews)"
        required: false
        default: "space"
      lang:
        description: "Language (en/hi)"
        required: false
        default: "en"
      dry_run:
        description: "Dry run — generate video but don't post to Instagram"
        required: false
        default: "false"
        type: boolean

jobs:
  post-reel:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 🔧 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-liberation fonts-noto
          fc-cache -fv

      - name: 📦 Install Python dependencies
        run: pip install -r requirements.txt

      - name: 💾 Restore cache
        uses: actions/cache@v4
        with:
          path: |
            output/music
            output/logs
            output/used_facts.json
            fonts/
          key: reels-cache-${{ github.run_number }}
          restore-keys: reels-cache-

      - name: 🎯 Determine topic and language
        id: topic
        run: python src/pick_topic.py
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          INPUT_TOPIC: ${{ github.event.inputs.topic }}
          INPUT_LANG:  ${{ github.event.inputs.lang }}

      - name: 🎬 Generate & post reel
        run: |
          python src/main.py run \
            "${{ steps.topic.outputs.topic }}" \
            "${{ steps.topic.outputs.lang }}" \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
          PEXELS_API_KEY:     ${{ secrets.PEXELS_API_KEY }}
          FREESOUND_API_KEY:  ${{ secrets.FREESOUND_API_KEY }}
          IG_SESSION_DATA:    ${{ secrets.IG_SESSION_DATA }}

      - name: 📤 Upload video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reel-${{ steps.topic.outputs.topic }}-${{ steps.topic.outputs.lang }}-${{ github.run_number }}
          path: |
            output/videos/*.mp4
            output/logs/run_*.json
          retention-days: 7

      - name: 📊 Update dashboard
        if: always()
        run: python src/update_dashboard.py
        env:
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:  ${{ github.repository }}
          RUN_STATUS:         ${{ job.status }}
          TOPIC:              ${{ steps.topic.outputs.topic }}
          LANG:               ${{ steps.topic.outputs.lang }}

      - name: 💾 Commit dashboard data
        if: always()
        run: |
          git config user.name "Reels Bot"
          git config user.email "bot@reels.local"
          git add dashboard/data.json output/used_facts.json || true
          git diff --cached --quiet || git commit -m "📊 Stats update [skip ci]"
          git push || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
