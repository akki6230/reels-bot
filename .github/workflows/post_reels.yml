name: 🚀 Post Daily Educational Reels — cosmos.capsule

on:
  schedule:
    # 1 reel/day at ~7:30 PM IST — strongest evening-scroll window for
    # Indian audiences (commute home / dinner-time downtime). Per growth
    # strategy: 1 great reel/day beats 3 diluted ones for a cold-start
    # account. IST = UTC + 5:30, so 19:30 IST = 14:00 UTC.
    - cron: "0 14 * * *"

  workflow_dispatch:
    inputs:
      topic:
        description: "examfacts / psychology / mindblowing / gk"
        required: false
        default: "gk"
      dry_run:
        description: "Dry run — generate video but don't post to Instagram"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  post-reel:
    runs-on: ubuntu-latest
    timeout-minutes: 55    # increased — video render can take 25+ mins

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"     # pip cache enabled — saves 5-8 mins per run

      - name: 🔧 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg \
            fonts-dejavu-core fonts-liberation \
            fonts-noto fonts-noto-core fonts-noto-hinted
          fc-cache -fv

      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir \
            moviepy==1.0.3 decorator==4.4.2 \
            imageio==2.25.1 imageio-ffmpeg==0.4.9
          pip install -r requirements.txt

      - name: 💾 Restore cache
        uses: actions/cache@v4
        with:
          path: |
            output/music
            output/used_facts.json
            fonts/
          key: reels-cache-v4-${{ github.run_number }}
          restore-keys: reels-cache-v4-

      - name: 🎯 Determine topic
        id: topic
        run: python src/pick_topic.py
        env:
          EVENT_NAME:  ${{ github.event_name }}
          INPUT_TOPIC: ${{ github.event.inputs.topic }}

      - name: 🎬 Generate & post reel (attempt 1)
        id: post_attempt_1
        continue-on-error: true
        run: |
          python src/main.py run \
            "${{ steps.topic.outputs.topic }}" \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
          PEXELS_API_KEY:     ${{ secrets.PEXELS_API_KEY }}
          FREESOUND_API_KEY:  ${{ secrets.FREESOUND_API_KEY }}
          IG_SESSION_DATA:    ${{ secrets.IG_SESSION_DATA }}
          HF_API_KEY:         ${{ secrets.HF_API_KEY }}

      - name: ⏳ Wait before retry
        if: steps.post_attempt_1.outcome == 'failure'
        run: |
          echo "Attempt 1 failed — waiting 60s before retry..."
          sleep 60

      - name: 🎬 Generate & post reel (attempt 2 — retry)
        if: steps.post_attempt_1.outcome == 'failure'
        id: post_attempt_2
        run: |
          python src/main.py run \
            "${{ steps.topic.outputs.topic }}" \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
          PEXELS_API_KEY:     ${{ secrets.PEXELS_API_KEY }}
          FREESOUND_API_KEY:  ${{ secrets.FREESOUND_API_KEY }}
          IG_SESSION_DATA:    ${{ secrets.IG_SESSION_DATA }}
          HF_API_KEY:         ${{ secrets.HF_API_KEY }}

      - name: 📤 Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reel-${{ steps.topic.outputs.topic }}-${{ github.run_number }}
          path: |
            output/videos/*.mp4
            output/logs/run_*.json
          retention-days: 7

      - name: 📊 Update dashboard
        if: always()
        run: python src/update_dashboard.py
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RUN_STATUS:        ${{ job.status }}
          TOPIC:             ${{ steps.topic.outputs.topic }}
          LANG:              "hi"

      - name: 💾 Commit dashboard data
        if: always()
        run: |
          git config user.name "Reels Bot"
          git config user.email "bot@reels.local"
          git pull --rebase origin main || true
          git add dashboard/data.json output/used_facts.json || true
          git diff --cached --quiet || \
            git commit -m "📊 Stats update [skip ci]"
          git push origin main || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
