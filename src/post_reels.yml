name: 🚀 Post Daily Educational Reels — cosmos.capsule

on:
  schedule:
    # 3 reels/day — all Hindi, topics rotate by day
    # IST = UTC + 5:30
    - cron: "30 3 * * *"    # 9:00 AM IST  — Hindi (morning peak)
    - cron: "30 7 * * *"    # 1:00 PM IST  — Hindi (afternoon)
    - cron: "30 13 * * *"   # 7:00 PM IST  — Hindi (prime time ⭐)

  workflow_dispatch:
    inputs:
      topic:
        description: "Topic: psychology / mindblowing / space / sciencewrong / earthglitch"
        required: false
        default: "space"
      dry_run:
        description: "Dry run — generate video but don't post to Instagram"
        required: false
        default: "false"
        type: boolean

# ── Required for git push back to repo ────────────────────────────────────────
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  post-reel:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 🔧 Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-liberation \
            fonts-noto fonts-noto-core fonts-noto-hinted \
            fonts-noto-unhinted fonts-noto-extra
          fc-cache -fv
          echo "Installed fonts:"
          fc-list | grep -i devanagari | head -10 || echo "No Devanagari fonts found in system"

      - name: 🗑 Clear pip cache
        run: pip cache purge

      - name: 📦 Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install --no-cache-dir moviepy==1.0.3 decorator==4.4.2 imageio==2.25.1 imageio-ffmpeg==0.4.9
          pip install --no-cache-dir -r requirements.txt

      - name: 💾 Restore cache
        uses: actions/cache@v4
        with:
          path: |
            output/music
            output/logs
            output/used_facts.json
            fonts/
          key: reels-cache-v3-${{ github.run_number }}
          restore-keys: reels-cache-v3-

      - name: 🎯 Determine topic
        id: topic
        run: python src/pick_topic.py
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          INPUT_TOPIC: ${{ github.event.inputs.topic }}

      - name: 🎬 Generate & post reel
        run: |
          python src/main.py run \
            "${{ steps.topic.outputs.topic }}" \
            ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_USERNAME: ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_PASSWORD: ${{ secrets.INSTAGRAM_PASSWORD }}
          PEXELS_API_KEY:     ${{ secrets.PEXELS_API_KEY }}
          FREESOUND_API_KEY:  ${{ secrets.FREESOUND_API_KEY }}
          IG_SESSION_DATA:    ${{ secrets.IG_SESSION_DATA }}
          HF_API_KEY:         ${{ secrets.HF_API_KEY }}

      - name: 📤 Upload video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reel-${{ steps.topic.outputs.topic }}-${{ steps.topic.outputs.lang }}-${{ github.run_number }}
          path: |
            output/videos/*.mp4
            output/logs/run_*.json
          retention-days: 7

      - name: 📊 Update dashboard
        if: always()
        run: python src/update_dashboard.py
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RUN_STATUS:        ${{ job.status }}
          TOPIC:             ${{ steps.topic.outputs.topic }}
          LANG:              ${{ steps.topic.outputs.lang }}

      - name: 💾 Commit dashboard data
        if: always()
        run: |
          git config user.name "Reels Bot"
          git config user.email "bot@reels.local"
          git pull --rebase origin main || true
          git add dashboard/data.json output/used_facts.json || true
          git diff --cached --quiet || git commit -m "📊 Stats update [skip ci]"
          git push origin main || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
